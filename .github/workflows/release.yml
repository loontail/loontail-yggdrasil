name: Release

# Runs on every push to `main`. For each package under `packages/` whose
# files changed since its last release tag, the workflow auto-bumps the
# patch version, commits the bumps as a single
# `chore(release): <tag>[, <tag>...]` commit, tags each bumped package
# with `<short-name>-vX.Y.Z`, publishes the new versions to npm with
# provenance, and creates a GitHub Release per package.
#
# Unchanged packages are left alone — `npm publish` is not invoked for
# them, so we don't bump versions for noise.
#
# Required secrets:
#   NPM_TOKEN      — npm automation token with publish scope on the
#                    `@loontail/*` packages.
#   RELEASE_TOKEN  — fine-grained PAT (Contents: read/write) owned by a
#                    user in the repo's branch ruleset bypass list. The
#                    default GITHUB_TOKEN cannot push directly to a
#                    protected `main`; RELEASE_TOKEN can.
#
# Loop guard: the bump commit (`chore(release): …`) triggers this
# workflow again; the guard job short-circuits when the commit message
# begins with `chore(release):` so the release does not chain into
# itself.
#
# To ship something other than a patch (minor / major), bump the
# package locally:
#   npm --workspace=packages/<pkg> version minor --no-git-tag-version
# commit as `chore(release): <pkg>-vX.Y.Z`, push — the guard treats it
# as a release commit (skips), and the next regular commit on `main`
# triggers the auto-bump from that baseline.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        env:
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MESSAGE" | grep -qE '^chore\(release\):'; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Release commit detected — skipping."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure required secrets are configured
        if: steps.check.outputs.proceed == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          missing=()
          [ -z "$NPM_TOKEN" ] && missing+=("NPM_TOKEN")
          [ -z "$RELEASE_TOKEN" ] && missing+=("RELEASE_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}. Set them under Settings → Secrets and variables → Actions before pushing to main."
            exit 1
          fi

  release:
    name: Bump + publish changed packages
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # `contents: write` lets the job push the bump commit and create
    # GitHub Releases. `id-token: write` enables npm provenance.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history + tags so we can diff each package
          # against its last release tag.
          fetch-depth: 0
          # PAT belongs to a repo admin (bypass list), so the push below
          # bypasses the "Require pull request" ruleset on main.
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: npm ci

      # Final gate — re-run every check before we publish. ci.yml
      # already ran them on the merged PR, but this is the last point
      # where we can stop a bad publish.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - name: Detect changed packages, bump versions, tag, push
        id: detect
        run: |
          set -euo pipefail

          # Topological dependency order: depend-on-nothing first so that
          # bumping a base package can cascade into its dependents' deps
          # rewrites before they are bumped themselves. The ordering is
          # static because the workspace graph is small; if a fourth
          # package lands, add it here in the right slot.
          ORDERED_PACKAGES=(yggdrasil-core yggdrasil-client strapi-plugin-yggdrasil)

          # Parallel arrays keep ordering deterministic; the JSON emitted
          # at the end drives the publish + release steps.
          declare -a pkg_dirs=()
          declare -a pkg_names=()
          declare -a pkg_versions=()
          declare -a pkg_tags=()
          declare -A bumped_versions=()

          # Bump a package's version in place by editing package.json with
          # node — bypasses `npm version`, which in a workspace shells out
          # to `npm i --package-lock-only` and 404s when a sibling still
          # references the old, never-published version of the package we
          # are about to bump.
          bump_package() {
            local dir="$1"
            local current
            local next
            current=$(node -p "require('./${dir}/package.json').version")
            next=$(node -e "
              const [a,b,c] = '${current}'.split('.').map(Number);
              console.log([a, b, c + 1].join('.'));
            ")
            node -e "
              const fs = require('fs');
              const path = './${dir}/package.json';
              const p = JSON.parse(fs.readFileSync(path, 'utf8'));
              p.version = '${next}';
              fs.writeFileSync(path, JSON.stringify(p, null, 2) + '\n');
            "
            echo "$next"
          }

          # Rewrite every reference to bumped @loontail/* siblings inside
          # `dependencies` / `peerDependencies` / `devDependencies` of the
          # given package.json. Returns 0 if anything changed, 1 otherwise.
          # The bumped-versions map is passed via env as JSON so we never
          # have to thread shell-quoted bash arrays into a node -e literal.
          update_internal_deps() {
            local dir="$1"
            local versions_json="$2"
            VERSIONS_JSON="$versions_json" PKG_PATH="${dir}/package.json" node -e '
              const fs = require("fs");
              const versions = JSON.parse(process.env.VERSIONS_JSON);
              const path = process.env.PKG_PATH;
              const p = JSON.parse(fs.readFileSync(path, "utf8"));
              let touched = false;
              for (const slot of ["dependencies", "peerDependencies", "devDependencies"]) {
                if (!p[slot]) continue;
                for (const [short, next] of Object.entries(versions)) {
                  const full = "@loontail/" + short;
                  if (p[slot][full] != null) {
                    p[slot][full] = "^" + next;
                    touched = true;
                  }
                }
              }
              if (touched) fs.writeFileSync(path, JSON.stringify(p, null, 2) + "\n");
              process.exit(touched ? 0 : 1);
            '
          }

          # Serialize the bumped_versions associative array as a JSON
          # object on demand. Used by update_internal_deps above.
          serialize_bumped_versions() {
            if [ ${#bumped_versions[@]} -eq 0 ]; then
              echo "{}"
              return
            fi
            local first=true
            local out="{"
            for k in "${!bumped_versions[@]}"; do
              if [ "$first" = true ]; then
                first=false
              else
                out+=","
              fi
              out+="\"${k}\":\"${bumped_versions[$k]}\""
            done
            out+="}"
            echo "$out"
          }

          for pkg_name in "${ORDERED_PACKAGES[@]}"; do
            pkg_dir="packages/$pkg_name"
            if [ ! -d "$pkg_dir" ]; then
              echo "[$pkg_name] not found under packages/ — skipping"
              continue
            fi

            # Step 1: cascade internal dep updates from earlier-bumped
            # siblings, even if this package has no file changes of its
            # own. If the dep ref was rewritten, treat the package as
            # transitively changed and bump it.
            transitive=false
            if [ ${#bumped_versions[@]} -gt 0 ]; then
              if update_internal_deps "$pkg_dir" "$(serialize_bumped_versions)"; then
                transitive=true
                echo "[$pkg_name] internal @loontail/* dep refs rewritten"
              fi
            fi

            # Step 2: own-file changes since the package's last release tag.
            last_tag=$(git tag --list "${pkg_name}-v*" --sort=-version:refname | head -1)
            own=false
            if [ -z "$last_tag" ]; then
              echo "[$pkg_name] no prior release tag — treating as changed (first publish)"
              own=true
            elif ! git diff --quiet "${last_tag}..HEAD" -- "$pkg_dir/"; then
              echo "[$pkg_name] changes detected since ${last_tag}"
              own=true
            else
              echo "[$pkg_name] no own-file changes since ${last_tag}"
            fi

            if [ "$own" = "false" ] && [ "$transitive" = "false" ]; then
              continue
            fi

            plain=$(bump_package "$pkg_dir")
            tag="${pkg_name}-v${plain}"
            bumped_versions[$pkg_name]="$plain"
            pkg_dirs+=("$pkg_dir")
            pkg_names+=("$pkg_name")
            pkg_versions+=("$plain")
            pkg_tags+=("$tag")
            git add "$pkg_dir/package.json"
            echo "[$pkg_name] bumped to ${plain}"
          done

          if [ ${#pkg_dirs[@]} -eq 0 ]; then
            echo "::notice::No packages changed — nothing to release."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # All sibling deps now reference the just-bumped versions, so
          # this lockfile sync resolves entirely via workspace links —
          # no registry round-trip needed for @loontail/* names that
          # don't exist on npm yet (first-time releases).
          npm install --package-lock-only --ignore-scripts
          git add package-lock.json

          # Single commit, multiple tags.
          commit_subject="chore(release): "
          first=true
          for tag in "${pkg_tags[@]}"; do
            if [ "$first" = "true" ]; then
              commit_subject+="${tag}"
              first=false
            else
              commit_subject+=", ${tag}"
            fi
          done
          git commit -m "${commit_subject}"

          for tag in "${pkg_tags[@]}"; do
            git tag "${tag}"
          done

          git push origin HEAD:main
          for tag in "${pkg_tags[@]}"; do
            git push origin "${tag}"
          done

          # Emit a compact JSON array consumed by the publish/release
          # steps. jq is preinstalled on ubuntu-latest.
          json="["
          for ((i = 0; i < ${#pkg_dirs[@]}; i++)); do
            [ $i -gt 0 ] && json+=","
            json+=$(jq -nc \
              --arg dir "${pkg_dirs[$i]}" \
              --arg name "${pkg_names[$i]}" \
              --arg version "${pkg_versions[$i]}" \
              --arg tag "${pkg_tags[$i]}" \
              '{dir: $dir, name: $name, version: $version, tag: $tag}')
          done
          json+="]"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "packages=${json}" >> "$GITHUB_OUTPUT"

      # Re-build off the freshly bumped versions so the published
      # tarballs carry the correct `version` field.
      - name: Rebuild after bump
        if: steps.detect.outputs.proceed == 'true'
        run: npm run build

      - name: Publish each changed package to npm
        if: steps.detect.outputs.proceed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGES_JSON: ${{ steps.detect.outputs.packages }}
        run: |
          set -euo pipefail
          echo "$PACKAGES_JSON" | jq -c '.[]' | while read -r pkg; do
            dir=$(echo "$pkg" | jq -r '.dir')
            tag=$(echo "$pkg" | jq -r '.tag')
            echo "::group::Publishing ${tag} (from ${dir})"
            (cd "$dir" && npm publish --provenance --access public)
            echo "::endgroup::"
          done

      - name: Create GitHub release per package
        if: steps.detect.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGES_JSON: ${{ steps.detect.outputs.packages }}
        run: |
          set -euo pipefail
          echo "$PACKAGES_JSON" | jq -c '.[]' | while read -r pkg; do
            tag=$(echo "$pkg" | jq -r '.tag')
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            echo "::group::Creating GitHub Release ${tag}"
            gh release create "$tag" \
              --title "@loontail/${name}@${version}" \
              --generate-notes
            echo "::endgroup::"
          done
